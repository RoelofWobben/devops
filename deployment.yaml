apiVersion: apps/v1
kind: Deployment
metadata:
  name: nonprofit-website
  namespace: default
  labels:
    app: nonprofit-website

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nonprofit-website

  template:
    metadata:
      labels:
        app: nonprofit-website

    spec:
      containers:
        - name: nginx
          image: nginx:latest

          ports:
            - containerPort: 80

          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html

      volumes:
        - name: html-volume
          configMap:
            name: nonprofit-website-configmap

